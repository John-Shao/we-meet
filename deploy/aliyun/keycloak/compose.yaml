# Keycloak + Postgres + Caddy (TLS termination) for the 2C2G ECS.
#
# 角色: 独立 OIDC 服务点 (id.we-meet.online)
# 部署:  Aliyun ECS 2C2G, Ubuntu, Docker + Compose v2
# 域名:  id.we-meet.online → 这台 ECS 的公网 IP
# TLS:   Caddy 自动从 Let's Encrypt 申请并续期 (HTTP-01 challenge, 备案完成后)
#
# Run:
#   cp .env.dist .env  &&  edit .env (fill in passwords)
#   docker compose up -d
#   # 等 keycloak 起来后 (约 30s)：
#   ./bootstrap-realm.sh    # 创建 meet realm / client / admin user
#
# 资源占用 (常态):
#   keycloak: ~700 MB
#   postgres: ~200 MB
#   caddy:    ~30 MB
#   总计:     ~1 GB → 2 GiB 留 1 GB 给系统

services:
  keycloak-db:
    image: postgres:16
    container_name: keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 20
    deploy:
      resources:
        limits:
          memory: 384M

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: keycloak
    restart: unless-stopped
    depends_on:
      keycloak-db:
        condition: service_healthy
    environment:
      KEYCLOAK_ADMIN: ${KC_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_HOSTNAME: id.we-meet.online
      KC_HOSTNAME_STRICT: "true"
      KC_HOSTNAME_STRICT_HTTPS: "true"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: "8080"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
      KC_LOG_LEVEL: INFO
      JAVA_OPTS_KC_HEAP: "-XX:MaxHeapFreeRatio=10 -XX:MinHeapFreeRatio=5 -Xms256m -Xmx768m"
    command:
      - start
      # No --optimized flag: Keycloak 25 auto-builds the optimized image on
      # each start. First boot is slow (~30-60s), subsequent restarts use the
      # cached build. To skip the auto-build, bake a custom image with
      # `kc.sh build` and pass `--optimized` here.
    expose:
      - "8080"
    deploy:
      resources:
        limits:
          memory: 1G

  caddy:
    image: caddy:2.8-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - keycloak
    deploy:
      resources:
        limits:
          memory: 96M

volumes:
  keycloak-db-data:
  caddy-data:
  caddy-config:
